# Render.com deployment for the Policy-to-Proof harness (FastAPI + web dashboard).
# Deploy: push to GitHub, then "New > Blueprint" in Render pointing at this repo.
services:
  - type: web
    name: policy-to-proof
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false        # set in the Render dashboard; never commit the key
      - key: PYTHON_VERSION
        value: "3.12.6"
