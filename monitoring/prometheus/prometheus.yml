global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - alerts.yml

scrape_configs:
  # Scrape the LIVE Render deployment over HTTPS.
  # (Keeping the free instance warm is a useful side effect of the 5s scrape.)
  - job_name: policy-to-proof
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets: ["fire-festival.onrender.com"]

  # Local dev alternative — uncomment and comment out the job above to scrape a
  # locally running `uvicorn api.main:app --port 8000` instead.
  # - job_name: policy-to-proof-local
  #   static_configs:
  #     - targets: ["host.docker.internal:8000"]
