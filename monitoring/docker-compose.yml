# Prometheus + Grafana for Policy-to-Proof.
# Prometheus scrapes the harness API's /metrics on the host; Grafana auto-loads
# a provisioned datasource + dashboard so you see charts immediately.
#
#   1. run the API on the host:  uvicorn api.main:app --port 8000
#   2. from this folder:         docker compose up
#   3. open Grafana:             http://localhost:3000  (anonymous, no login)
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: p2p-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: p2p-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_USERS_DEFAULT_THEME=dark
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
